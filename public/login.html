 <!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saldo — Вхід</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 12px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-size: 24px; margin-bottom: 8px; color: #1a1a1a; }
    p { color: #666; margin-bottom: 28px; font-size: 14px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
    input { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 16px; outline: none; transition: border 0.2s; }
    input:focus { border-color: #6c47ff; }
    button { width: 100%; padding: 12px; background: #6c47ff; color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:hover { background: #5a35e8; }
    .error { color: #e53e3e; font-size: 13px; margin-bottom: 12px; display: none; }
    .link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
    .link a { color: #6c47ff; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Saldo</h1>
    <p>Увійдіть у свій акаунт</p>
    <div class="error" id="error"></div>
    <label>Email</label>
    <input type="email" id="email" placeholder="your@email.com">
    <label>Пароль</label>
    <input type="password" id="password" placeholder="••••••••">
    <button onclick="login()">Увійти</button>
    <div class="link">Немає акаунту? <a href="/register.html">Зареєструватись</a></div>
  </div>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/index.html';

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const err = document.getElementById('error');
      err.style.display = 'none';
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = data.error; err.style.display = 'block'; return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = '/index.html';
      } catch (e) {
        err.textContent = 'Помилка з\'єднання'; err.style.display = 'block';
      }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
